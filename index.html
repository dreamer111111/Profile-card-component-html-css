<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Profile card component</title>
</head>
<body>
  <main>
    <article class="card">
      
      <header class="card__header">
        <img src="./images/bg-pattern-card.svg" class="card-bg" alt="" aria-hidden="true">
        <img src="./images/image-victor.jpg" class="profile-img" alt="Portrait of Victor Crest">
      </header>

      <section class="card__body">
        <h1 class="name">
          Victor Crest <span class="age" aria-label="years old">26</span>
        </h1>
        <p class="location">London</p>
      </section>

      <footer class="card__stats">
        <ul class="stats-list">
          <li>
            <strong class="stats-val">80K</strong>
            <span class="stats-label">Followers</span>
          </li>
          <li>
            <strong class="stats-val">803K</strong>
            <span class="stats-label">Likes</span>
          </li>
          <li>
            <strong class="stats-val">1.4K</strong>
            <span class="stats-label">Photos</span>
          </li>
        </ul>
      </footer>

    </article>
  </main>
</body>
</html>
